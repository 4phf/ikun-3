
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ikun 计算器</title>
<style>
body{background:#111;color:#eee;font-family:Arial,sans-serif;max-width:900px;margin:auto;padding:20px}
.card{background:#1b1b1b;padding:18px;border-radius:12px;margin:14px 0}
input{width:100%;padding:10px;margin:6px 0;background:#222;color:#fff;border:1px solid #444;border-radius:8px}
button{padding:10px 16px;border:none;border-radius:8px;background:#f4c542;cursor:pointer}
.good{color:#3ddc84}.bad{color:#ff6b6b}
table{width:100%;border-collapse:collapse}
td,th{border-bottom:1px solid #333;padding:8px}
</style>
</head>
<body>
<h1>🐥 Ikun 计算器</h1>

<div class="card">
<h2>Surebet / 套利计算</h2>
<label>主胜赔率</label><input id="h" type="number" step="0.01" value="1.80">
<label>平局赔率</label><input id="d" type="number" step="0.01" value="4.20">
<label>客胜赔率</label><input id="a" type="number" step="0.01" value="10">
<label>总本金 (RM)</label><input id="bank" type="number" step="0.01" value="1000">
<button onclick="calc()">计算</button>
<div id="out"></div>
</div>

<script>
function calc(){
 let h=+document.getElementById('h').value;
 let d=+document.getElementById('d').value;
 let a=+document.getElementById('a').value;
 let bank=+document.getElementById('bank').value;
 let s=1/h+1/d+1/a;
 let hh=bank*(1/h)/s;
 let dd=bank*(1/d)/s;
 let aa=bank*(1/a)/s;
 let retH=hh*h, retD=dd*d, retA=aa*a;
 let profit=((Math.min(retH,retD,retA)-bank)/bank*100);
 let cls=s<1?"good":"bad";
 let txt=`<p class="${cls}"><b>${s<1?"✅ 存在套利":"❌ 无套利"}</b></p>
 <p>倒数总和: ${s.toFixed(4)}</p>
 <p>理论收益率: ${profit.toFixed(2)}%</p>
 <table>
 <tr><th>结果</th><th>下注(RM)</th><th>返还(RM)</th></tr>
 <tr><td>主胜</td><td>${hh.toFixed(2)}</td><td>${retH.toFixed(2)}</td></tr>
 <tr><td>平局</td><td>${dd.toFixed(2)}</td><td>${retD.toFixed(2)}</td></tr>
 <tr><td>客胜</td><td>${aa.toFixed(2)}</td><td>${retA.toFixed(2)}</td></tr>
 </table>`;
 document.getElementById('out').innerHTML=txt;
}
calc();
</script>
</body>
</html>
